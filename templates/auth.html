<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyCast</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-wrap">

    <div class="brand">StudyCast</div>
    <p class="subtitle">Track exams, assignments, and study sessions.</p>

    <div class="tab-switch">
        <button id="tab-signin" class="active" onclick="showSignin()">Sign In</button>
        <button id="tab-signup" onclick="showSignup()">Sign Up</button>
    </div>

    <!-- Sign In -->
    <div id="signinForm" class="card">
        <form action="/auth" method="POST" class="form-group">
            <input type="hidden" name="action" value="signin">

            <div class="form-row">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-row">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" style="margin-top:6px;">Sign In</button>
        </form>
    </div>

    <!-- Sign Up -->
    <div id="signupForm" class="card" style="display:none;">
        <form action="/auth" method="POST" class="form-group">
            <input type="hidden" name="action" value="signup">

            <div class="form-row">
                <label>Name</label>
                <input type="text" name="name" placeholder="Your name" required>
            </div>
            <div class="form-row">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-row">
                <label>Password</label>
                <input type="password" name="password" placeholder="Choose a password" required>
            </div>

            <button type="submit" style="margin-top:6px;">Create Account</button>
        </form>
    </div>

</div>

<script>
    function showSignin() {
        document.getElementById("signinForm").style.display = "block";
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("tab-signin").classList.add("active");
        document.getElementById("tab-signup").classList.remove("active");
    }
    function showSignup() {
        document.getElementById("signupForm").style.display = "block";
        document.getElementById("signinForm").style.display = "none";
        document.getElementById("tab-signup").classList.add("active");
        document.getElementById("tab-signin").classList.remove("active");
    }
</script>

</body>
</html>
